<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --rdc-red:#D92228;--rdc-red-dark:#B01B20;--rdc-red-light:#FCEAEA;--rdc-navy:#1A1A1A;
  --bg:#F5F5F5;--surface:#FFFFFF;--surface2:#F0F0F0;--border:#E2E2E2;--border-dark:#CACACA;
  --text:#1A1A1A;--text-muted:#5C5C5C;--text-faint:#9A9A9A;
  --sw-bg:#FFF8E6;--sw-text:#7A5C00;--sw-dot:#E9A825;
  --sa-bg:var(--rdc-red-light);--sa-text:#8C1A1E;--sa-dot:var(--rdc-red);
  --sr-bg:#FFF0E6;--sr-text:#7A3800;--sr-dot:#E97225;
  --sp-bg:#EEF4FF;--sp-text:#2A4A8C;--sp-dot:#4A7AE0;
  --sd-bg:#F0F0F0;--sd-text:#888;--sd-dot:#AAAAAA;
  --co:#1D9E75;--cx:#2176C7;--cd:var(--rdc-red);--cp:#8B3FA8;
  --fd:'Source Serif 4',Georgia,serif;--fs:'Source Sans 3',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111;--surface:#1C1C1C;--surface2:#262626;--border:#303030;--border-dark:#444;
    --text:#F2F2F2;--text-muted:#A0A0A0;--text-faint:#5A5A5A;
    --rdc-red-light:#2A0708;--sw-bg:#2A2100;--sw-text:#F5C842;
    --sa-bg:#2A0708;--sa-text:#F47578;--sb-bg:#110E2A;--sb-text:#A899F0;
    --sr-bg:#2A1500;--sr-text:#FFAA6B;--sp-bg:#0E1A35;--sp-text:#7AA4F5;
    --sd-bg:#222;--sd-text:#666;--sd-dot:#555;
  }
}
body{font-family:var(--fs);background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px;max-width:900px;margin:0 auto;}
.topbar{background:var(--rdc-red);height:4px;}
header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;padding:28px 32px 20px;border-bottom:1px solid var(--border);}
h1{font-family:var(--fd);font-size:30px;font-weight:300;font-style:italic;letter-spacing:-0.3px;line-height:1;margin-bottom:5px;}
h1 span{color:var(--rdc-red);font-style:normal;font-weight:600;font-family:var(--fs);font-size:13px;letter-spacing:0.06em;text-transform:uppercase;margin-right:10px;vertical-align:middle;}
.date-sub{font-size:11px;color:var(--text-faint);letter-spacing:0.06em;text-transform:uppercase;}
.hdr-right{display:flex;gap:8px;}
.btn{font-family:var(--fs);font-size:12px;font-weight:500;padding:8px 16px;border-radius:4px;cursor:pointer;transition:all .15s;border:1px solid var(--border-dark);background:var(--surface);color:var(--text);}
.btn:hover{background:var(--surface2);}
.btn-p{background:var(--rdc-red);color:#fff;border-color:var(--rdc-red);}
.btn-p:hover{background:var(--rdc-red-dark);border-color:var(--rdc-red-dark);}
.filter-section{margin:0 32px 8px;}
.flabel{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;}
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.fb{font-family:var(--fs);font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all .15s;}
.fb:hover{border-color:var(--border-dark);color:var(--text);}
.fb.on{background:var(--rdc-navy);color:#fff;border-color:var(--rdc-navy);}
.fb.proj.on{background:var(--rdc-red);border-color:var(--rdc-red);color:#fff;}
.view-row{display:flex;gap:4px;margin:12px 32px 20px;align-items:center;}
.view-row span{font-size:11px;color:var(--text-faint);margin-right:4px;}
.vb{font-family:var(--fs);font-size:11px;font-weight:500;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;}
.vb.on{background:var(--surface);border-color:var(--border-dark);color:var(--text);}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.list{display:flex;flex-direction:column;gap:2px;padding:0 32px;}
.pg-hdr{padding:10px 16px 8px;display:flex;align-items:baseline;gap:8px;}
.pg-name{font-size:13px;font-weight:600;color:var(--text);}
.pg-ct{font-size:11px;color:var(--text-faint);}
.pg-items{display:flex;flex-direction:column;gap:2px;}
.row{display:grid;grid-template-columns:24px 1fr auto auto;align-items:start;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;transition:border-color .15s;cursor:pointer;}
.row:hover{border-color:var(--border-dark);}
.row.open{border-color:var(--border-dark);border-bottom-left-radius:0;border-bottom-right-radius:0;}
.stripe{width:3px;border-radius:2px;min-height:20px;align-self:stretch;}
.main{min-width:0;}
.ititle{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:4px;}
.imeta{font-size:12px;color:var(--text-faint);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ptag{font-size:10px;font-weight:600;letter-spacing:.04em;padding:2px 7px;border-radius:3px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);white-space:nowrap;}
.sb{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;align-self:start;}
.s-watch{background:var(--sw-bg);color:var(--sw-text);}
.s-action{background:var(--sa-bg);color:var(--sa-text);}
.s-blocked{background:var(--sb-bg);color:var(--sb-text);}
.s-reminder{background:var(--sr-bg);color:var(--sr-text);}
.s-pending{background:var(--sp-bg);color:var(--sp-text);}
.s-done{background:var(--sd-bg);color:var(--sd-text);}
.row.is-done{opacity:.55;}
.row.is-done .ititle{text-decoration:line-through;color:var(--text-muted);}
.row.is-done .stripe{opacity:.4;}
.chev{font-size:16px;color:var(--text-faint);align-self:start;transition:transform .2s;padding-top:1px;line-height:1;}
.row.open .chev{transform:rotate(90deg);}
.detail{display:none;padding:12px 16px 14px 52px;background:var(--surface);border:1px solid var(--border-dark);border-top:none;border-radius:0 0 6px 6px;}
.detail.show{display:block;}
.dnote{font-size:13px;color:var(--text-muted);line-height:1.6;border-left:2px solid var(--rdc-red);padding-left:12px;margin-bottom:10px;}
.dcheckin{font-size:12px;color:var(--text-faint);margin-bottom:8px;}
.dacts{display:flex;gap:8px;margin-top:10px;}
.dacts button{font-family:var(--fs);font-size:12px;font-weight:500;padding:5px 12px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .15s;}
.dacts button:hover{color:var(--text);border-color:var(--border-dark);}
.dacts button.del:hover{color:var(--rdc-red);border-color:var(--rdc-red);}
.empty{text-align:center;padding:60px 0;color:var(--text-faint);font-size:14px;}
.empty p:first-child{font-family:var(--fd);font-size:20px;font-weight:300;font-style:italic;margin-bottom:8px;color:var(--text-muted);}
.sumbar{display:flex;gap:20px;margin:0 32px 20px;padding:12px 16px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);}
.si{font-size:12px;color:var(--text-muted);}
.si strong{color:var(--text);font-weight:600;}
.sdiv{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);margin:20px 32px 8px;display:flex;align-items:center;gap:8px;}
.sdiv::after{content:'';flex:1;height:1px;background:var(--border);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border-dark);border-radius:8px;padding:28px;width:540px;max-width:92vw;max-height:88vh;overflow-y:auto;}
.modal h2{font-family:var(--fd);font-weight:300;font-style:italic;font-size:22px;margin-bottom:20px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.field input,.field textarea,.field select{width:100%;font-family:var(--fs);font-size:14px;padding:9px 12px;border-radius:4px;border:1px solid var(--border-dark);background:var(--surface2);color:var(--text);resize:vertical;outline:none;transition:border-color .15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--rdc-red);}
.field select option{background:var(--surface);}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.crad{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:4px;border:1px solid var(--border);cursor:pointer;transition:all .15s;font-size:13px;color:var(--text-muted);}
.crad input{display:none;}
.crad:hover{border-color:var(--border-dark);color:var(--text);}
.crad.on{border-color:var(--rdc-red);background:var(--rdc-red-light);color:var(--text);}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:24px;}
.plist{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.pitem{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);font-size:13px;}
.pdel{font-size:12px;color:var(--text-faint);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:3px;font-family:var(--fs);}
.pdel:hover{color:var(--rdc-red);background:var(--rdc-red-light);}
.addrow{display:flex;gap:8px;}
.addrow input{flex:1;font-family:var(--fs);font-size:14px;padding:8px 12px;border-radius:4px;border:1px solid var(--border-dark);background:var(--surface2);color:var(--text);outline:none;}
.addrow input:focus{border-color:var(--rdc-red);}
.backup-banner{display:none;margin:0 32px 16px;padding:10px 16px;background:var(--sw-bg);border:1px solid #E9C84A;border-radius:6px;font-size:13px;color:var(--sw-text);align-items:center;justify-content:space-between;gap:12px;}
.backup-banner.show{display:flex;}
.backup-banner strong{font-weight:600;}
.bba{display:flex;gap:8px;flex-shrink:0;}
.bb-now{font-family:var(--fs);font-size:12px;font-weight:500;padding:5px 12px;border-radius:4px;cursor:pointer;background:var(--sw-text);color:#fff;border:1px solid var(--sw-text);transition:all .15s;}
.bb-now:hover{opacity:.85;}
.bb-dim{font-family:var(--fs);font-size:12px;font-weight:500;padding:5px 12px;border-radius:4px;cursor:pointer;background:transparent;border:1px solid var(--sw-text);color:var(--sw-text);transition:all .15s;}
.bb-dim:hover{background:rgba(0,0,0,.06);}
</style>
</head>
<body>
<div class="topbar"></div>
<header>
  <div>
    <h1><span>RDC</span>Radar</h1>
    <p class="date-sub" id="dt"></p>
  </div>
  <div class="hdr-right">
    <button class="btn" onclick="openProjModal()">Projects</button>
    <button class="btn" onclick="exportLog()">Export .txt</button>
    <button class="btn" onclick="backupJSON()">Backup</button>
    <button class="btn" onclick="document.getElementById('import-input').click()">Restore</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="btn btn-p" onclick="openModal()">+ Add to radar</button>
  </div>
</header>

<div class="backup-banner" id="backup-banner">
  <span id="backup-banner-msg">Your last backup was over 7 days ago.</span>
  <div class="bba">
    <button class="bb-now" onclick="backupNow()">Back up now</button>
    <button class="bb-dim" onclick="dismissBanner()">Dismiss</button>
  </div>
</div>

<div class="sumbar" id="sumbar"></div>

<div class="filter-section">
  <div class="flabel">Status</div>
  <div class="frow" id="sf">
    <button class="fb on" onclick="setSF('all',this)">All</button>
    <button class="fb" onclick="setSF('s-action',this)"><span class="dot" style="background:var(--sa-dot)"></span>Needs action</button>
    <button class="fb" onclick="setSF('s-watch',this)"><span class="dot" style="background:var(--sw-dot)"></span>Watching</button>
    <button class="fb" onclick="setSF('s-blocked',this)"><span class="dot" style="background:var(--sb-dot)"></span>Blocked</button>
    <button class="fb" onclick="setSF('s-reminder',this)"><span class="dot" style="background:var(--sr-dot)"></span>Reminder</button>
    <button class="fb" onclick="setSF('s-pending',this)"><span class="dot" style="background:var(--sp-dot)"></span>Pending decision</button>
    <button class="fb" onclick="setSF('s-done',this)"><span class="dot" style="background:var(--sd-dot)"></span>Done</button>
    <button class="fb" onclick="setSF('c-own',this)">My tasks</button>
    <button class="fb" onclick="setSF('c-xfn',this)">X-fn</button>
    <button class="fb" onclick="setSF('c-design',this)">Design/product</button>
    <button class="fb" onclick="setSF('c-people',this)">People</button>
  </div>
  <div class="flabel" style="margin-top:10px">Project</div>
  <div class="frow" id="pf"></div>
</div>

<div class="view-row">
  <span>View:</span>
  <button class="vb on" id="vs" onclick="setView('status')">By status</button>
  <button class="vb" id="vp" onclick="setView('project')">By project</button>
</div>

<div class="list" id="list"></div>

<!-- Add/Edit modal -->
<div class="overlay" id="mo" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="mt">Add to radar</h2>
    <input type="hidden" id="eid">
    <div class="field"><label>What is it?</label><input type="text" id="ft" placeholder="One-line summary..."></div>
    <div class="field"><label>Project</label><select id="fp"></select></div>
    <div class="field">
      <label>Category</label>
      <div class="cats">
        <label class="crad on" id="cr-own"><input type="radio" name="cat" value="own" checked><span class="dot" style="background:var(--co)"></span>My tasks &amp; open loops</label>
        <label class="crad" id="cr-xfn"><input type="radio" name="cat" value="xfn"><span class="dot" style="background:var(--cx)"></span>X-fn dependencies</label>
        <label class="crad" id="cr-design"><input type="radio" name="cat" value="design"><span class="dot" style="background:var(--cd)"></span>Design / product decisions</label>
        <label class="crad" id="cr-people"><input type="radio" name="cat" value="people"><span class="dot" style="background:var(--cp)"></span>Team / people things</label>
      </div>
    </div>
    <div class="field"><label>Status</label><select id="fs2"><option value="watch">Watching</option><option value="action">Needs action</option><option value="blocked">Blocked on someone</option><option value="reminder">Reminder</option><option value="pending">Pending decision</option><option value="done">Done / Resolved</option></select></div>
    <div class="field"><label>Notes (optional)</label><textarea id="fn" rows="3" placeholder="Context, background, who's involved..."></textarea></div>
    <div class="field"><label>Check-in date (optional)</label><input type="date" id="fc"></div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" onclick="saveIssue()">Save</button>
    </div>
  </div>
</div>

<!-- Manage projects modal -->
<div class="overlay" id="pm" onclick="if(event.target===this)closeProjModal()">
  <div class="modal">
    <h2>Manage projects</h2>
    <div class="plist" id="pl"></div>
    <div class="addrow">
      <input type="text" id="np" placeholder="New project name..." onkeydown="if(event.key==='Enter')addProject()">
      <button class="btn btn-p" onclick="addProject()">Add</button>
    </div>
    <div class="mfoot"><button class="btn btn-p" onclick="closeProjModal()">Done</button></div>
  </div>
</div>

<script>
const SK='radar_v1', PK='radar_projects_v1';
const DEFS=['RealPro Dashboard','RealPro App','Online Store & Billing'];
const CM={
  own:{label:'My tasks',color:'var(--co)',bg:'#E1F5EE',tc:'#085041'},
  xfn:{label:'X-fn',color:'var(--cx)',bg:'#E6F1FB',tc:'#0C3E78'},
  design:{label:'Design',color:'var(--cd)',bg:'#FCEAEA',tc:'#8C1A1E'},
  people:{label:'People',color:'var(--cp)',bg:'#F5E8FF',tc:'#5B1A8A'},
};
const SM={
  watch:{label:'Watching',cls:'s-watch',dot:'var(--sw-dot)'},
  action:{label:'Needs action',cls:'s-action',dot:'var(--sa-dot)'},
  blocked:{label:'Blocked on someone',cls:'s-blocked',dot:'var(--sb-dot)'},
  reminder:{label:'Reminder',cls:'s-reminder',dot:'var(--sr-dot)'},
  pending:{label:'Pending decision',cls:'s-pending',dot:'var(--sp-dot)'},
  done:{label:'Done / Resolved',cls:'s-done',dot:'var(--sd-dot)'},
};
let issues=[],custom=[],sf='all',pf='all',view='status';
function allP(){return[...DEFS,...custom];}
function load(){
  try{issues=JSON.parse(localStorage.getItem(SK))||[];}catch(e){issues=[];}
  try{custom=JSON.parse(localStorage.getItem(PK))||[];}catch(e){custom=[];}
}
function save(){
  localStorage.setItem(SK,JSON.stringify(issues));
  localStorage.setItem(PK,JSON.stringify(custom));
}
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setSF(f,btn){
  sf=f;
  document.querySelectorAll('#sf .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');render();
}
function setPF(f,btn){
  pf=f;
  document.querySelectorAll('#pf .fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');render();
}
function setView(v){
  view=v;
  document.getElementById('vs').classList.toggle('on',v==='status');
  document.getElementById('vp').classList.toggle('on',v==='project');
  render();
}
function matches(i){
  const sok=sf==='all'?true:sf.startsWith('s-')?i.status===sf.slice(2):i.category===sf.slice(2);
  const pok=pf==='all'?true:(i.project||'No project')===pf;
  return sok&&pok;
}
function renderPF(){
  const c=document.getElementById('pf');
  let html=`<button class="fb proj ${pf==='all'?'on':''}" onclick="setPF('all',this)">All projects</button>`;
  allP().forEach(p=>{html+=`<button class="fb proj ${pf===p?'on':''}" onclick="setPF('${h(p)}',this)">${h(p)}</button>`;});
  html+=`<button class="fb proj ${pf==='No project'?'on':''}" onclick="setPF('No project',this)">No project</button>`;
  c.innerHTML=html;
}
function render(){
  renderPF();
  const vis=issues.filter(matches);
  const co={watch:0,action:0,blocked:0,reminder:0,pending:0,done:0};
  issues.forEach(i=>{ if(co[i.status]!==undefined) co[i.status]++; });
  document.getElementById('sumbar').innerHTML=
    `<span class="si"><strong>${issues.length}</strong> total</span>`+
    `<span class="si"><span class="dot" style="background:var(--sa-dot)"></span><strong>${co.action}</strong> need action</span>`+
    `<span class="si"><span class="dot" style="background:var(--sb-dot)"></span><strong>${co.blocked}</strong> blocked</span>`+
    `<span class="si"><span class="dot" style="background:var(--sr-dot)"></span><strong>${co.reminder}</strong> reminders</span>`+
    `<span class="si"><span class="dot" style="background:var(--sd-dot)"></span><strong>${co.done}</strong> done</span>`;
  const list=document.getElementById('list');
  if(!vis.length){list.innerHTML=`<div class="empty"><p>Nothing here yet.</p><p>${sf==='all'&&pf==='all'?'Add your first item above.':'No items match this filter.'}</p></div>`;return;}
  if(view==='status')renderByStatus(vis,list);
  else renderByProject(vis,list);
}
function srt(arr){return[...arr].sort((a,b)=>({action:0,blocked:1,reminder:2,pending:3,watch:4,done:5}[a.status]-{action:0,blocked:1,reminder:2,pending:3,watch:4,done:5}[b.status]));}
function renderByStatus(vis,list){
  let html='';
  [{key:'action',label:'Needs action'},{key:'blocked',label:'Blocked on someone'},{key:'reminder',label:'Reminder'},{key:'pending',label:'Pending decision'},{key:'watch',label:'Watching'},{key:'done',label:'Done / Resolved'}].forEach(sec=>{
    const g=srt(vis).filter(i=>i.status===sec.key);
    if(!g.length)return;
    html+=`<div class="sdiv"><span class="dot" style="background:${SM[sec.key].dot}"></span>${sec.label}</div>`;
    g.forEach(i=>{html+=rowHTML(i,true);});
  });
  list.innerHTML=html;
}
function renderByProject(vis,list){
  let html='';
  [...allP(),'No project'].forEach(proj=>{
    const g=srt(vis.filter(i=>(i.project||'No project')===proj));
    if(!g.length)return;
    html+=`<div><div class="pg-hdr"><span class="pg-name">${h(proj)}</span><span class="pg-ct">${g.length} item${g.length!==1?'s':''}</span></div><div class="pg-items">`;
    g.forEach(i=>{html+=rowHTML(i,false);});
    html+=`</div></div>`;
  });
  list.innerHTML=html||`<div class="empty"><p>Nothing here.</p></div>`;
}
function rowHTML(issue,showProj){
  const cat=CM[issue.category]||CM.own;
  const st=SM[issue.status];
  const added=new Date(issue.created).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const chk=issue.checkin?` · check-in ${new Date(issue.checkin+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}` :'';
  const ptag=showProj&&issue.project?`<span class="ptag">${h(issue.project)}</span>`:'';
  return`<div class="row${issue.status==='done'?' is-done':''}" id="r${issue.id}" onclick="tog('${issue.id}')">
    <div class="stripe" style="background:${cat.color}"></div>
    <div class="main">
      <div class="ititle">${h(issue.title)}</div>
      <div class="imeta">
        <span style="padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;background:${cat.bg};color:${cat.tc};">${cat.label}</span>
        ${ptag}<span>added ${added}${chk}</span>
      </div>
    </div>
    <span class="sb ${st.cls}">${st.label}</span>
    <span class="chev">&#x203A;</span>
  </div>
  <div class="detail" id="d${issue.id}">
    ${issue.notes?`<div class="dnote">${h(issue.notes)}</div>`:'<div class="dnote" style="opacity:.5">No notes added.</div>'}
    ${issue.checkin?`<div class="dcheckin">Check-in: ${new Date(issue.checkin+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>`:''}
    <div class="dacts">
      <button onclick="event.stopPropagation();editI('${issue.id}')">Edit</button>
      <button onclick="event.stopPropagation();cycleS('${issue.id}')">Cycle status</button>
      <button class="del" onclick="event.stopPropagation();delI('${issue.id}')">Delete</button>
    </div>
  </div>`;
}
function tog(id){
  const row=document.getElementById('r'+id),det=document.getElementById('d'+id);
  const was=det.classList.contains('show');
  document.querySelectorAll('.detail.show').forEach(d=>d.classList.remove('show'));
  document.querySelectorAll('.row.open').forEach(r=>r.classList.remove('open'));
  if(!was){det.classList.add('show');row.classList.add('open');}
}
function cycleS(id){
  const o=['watch','action','blocked','reminder','pending','done'],i=issues.find(x=>x.id===id);
  if(!i)return;i.status=o[(o.indexOf(i.status)+1)%o.length];save();render();
}
function delI(id){
  if(!confirm('Remove this item from radar?'))return;
  issues=issues.filter(i=>i.id!==id);save();render();
}
function popProj(sel){
  document.getElementById('fp').innerHTML=
    `<option value="">No project</option>`+allP().map(p=>`<option value="${h(p)}"${sel===p?' selected':''}>${h(p)}</option>`).join('');
}
function openModal(issue){
  document.getElementById('mt').textContent=issue?'Edit item':'Add to radar';
  document.getElementById('eid').value=issue?issue.id:'';
  document.getElementById('ft').value=issue?issue.title:'';
  document.getElementById('fs2').value=issue?issue.status:'watch';
  document.getElementById('fn').value=issue?(issue.notes||''):'';
  document.getElementById('fc').value=issue?(issue.checkin||''):'';
  popProj(issue?(issue.project||''):'');
  document.querySelectorAll('.crad').forEach(r=>r.classList.remove('on'));
  const cv=issue?issue.category:'own';
  const lbl=document.getElementById('cr-'+cv);
  if(lbl){lbl.classList.add('on');lbl.querySelector('input').checked=true;}
  document.querySelectorAll('.crad').forEach(lbl=>{
    lbl.onclick=()=>{document.querySelectorAll('.crad').forEach(r=>r.classList.remove('on'));lbl.classList.add('on');};
  });
  document.getElementById('mo').classList.add('show');
  setTimeout(()=>document.getElementById('ft').focus(),50);
}
function editI(id){const i=issues.find(x=>x.id===id);if(i)openModal(i);}
function closeModal(){document.getElementById('mo').classList.remove('show');}
function saveIssue(){
  const title=document.getElementById('ft').value.trim();
  if(!title){document.getElementById('ft').focus();return;}
  const ci=document.querySelector('input[name="cat"]:checked');
  const cat=ci?ci.value:'own';
  const status=document.getElementById('fs2').value;
  const notes=document.getElementById('fn').value.trim();
  const checkin=document.getElementById('fc').value;
  const project=document.getElementById('fp').value||'';
  const eid=document.getElementById('eid').value;
  if(eid){
    const i=issues.find(x=>x.id===eid);
    if(i){i.title=title;i.category=cat;i.status=status;i.notes=notes;i.checkin=checkin;i.project=project;}
  } else {
    issues.unshift({id:Date.now().toString(),title,category:cat,status,notes,checkin,project,created:new Date().toISOString()});
  }
  save();closeModal();render();
}
function openProjModal(){renderPL();document.getElementById('pm').classList.add('show');setTimeout(()=>document.getElementById('np').focus(),50);}
function closeProjModal(){document.getElementById('pm').classList.remove('show');render();}
function renderPL(){
  const c=document.getElementById('pl');
  let html=DEFS.map(p=>`<div class="pitem"><span>${h(p)}</span><span style="font-size:11px;color:var(--text-faint)">default</span></div>`).join('');
  html+=custom.map((p,i)=>`<div class="pitem"><span>${h(p)}</span><button class="pdel" onclick="rmP(${i})">Remove</button></div>`).join('');
  c.innerHTML=html||'<div style="color:var(--text-faint);font-size:13px;padding:8px 0">No custom projects yet.</div>';
}
function addProject(){
  const input=document.getElementById('np');
  const name=input.value.trim();
  if(!name||allP().includes(name)){input.value='';return;}
  custom.push(name);save();input.value='';renderPL();
}
function rmP(idx){
  const rm=custom[idx];custom.splice(idx,1);
  issues.forEach(i=>{if(i.project===rm)i.project='';});
  save();renderPL();
}
const BK_KEY='radar_last_backup';
const REMINDER_DAYS=7;
function backupJSON(){
  const backup={version:1,exported:new Date().toISOString(),issues,customProjects:custom};
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='radar-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  localStorage.setItem(BK_KEY,new Date().toISOString());
  dismissBanner();
  showToast('Backup saved.');
}
function backupNow(){backupJSON();}
function dismissBanner(){document.getElementById('backup-banner').classList.remove('show');}
function checkBackupReminder(){
  if(!issues.length)return;
  const last=localStorage.getItem(BK_KEY);
  if(!last){
    document.getElementById('backup-banner-msg').textContent="You haven't backed up yet — your data only lives in this browser.";
    document.getElementById('backup-banner').classList.add('show');return;
  }
  const days=Math.floor((Date.now()-new Date(last).getTime())/(1000*60*60*24));
  if(days>=REMINDER_DAYS){
    document.getElementById('backup-banner-msg').textContent=`Your last backup was ${days} day${days!==1?'s':''} ago.`;
    document.getElementById('backup-banner').classList.add('show');
  }
}
function importJSON(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.issues||!Array.isArray(data.issues))throw new Error('Invalid backup file.');
      const itemCount=data.issues.length;
      const projCount=(data.customProjects||[]).length;
      if(!confirm(`Restore ${itemCount} item${itemCount!==1?'s':''} and ${projCount} custom project${projCount!==1?'s':''}?\n\nThis will replace everything currently in your Radar. This cannot be undone.`)){
        event.target.value='';return;
      }
      issues=data.issues;
      custom=data.customProjects||[];
      save();render();
      localStorage.setItem(BK_KEY,new Date().toISOString());
      event.target.value='';
      showToast(`Restored ${itemCount} item${itemCount!==1?'s':''} successfully.`);
    }catch(err){
      alert('Could not read backup file. Make sure you are using a Radar backup (.json).');
      event.target.value='';
    }
  };
  reader.readAsText(file);
}
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--rdc-navy);color:#fff;font-family:var(--fs);font-size:13px;font-weight:500;padding:10px 20px;border-radius:6px;z-index:999;transition:opacity .3s;pointer-events:none;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._to);t._to=setTimeout(()=>{t.style.opacity='0';},3000);
}
function exportLog(){
  const lines=['RADAR — exported '+new Date().toLocaleDateString(),''];
  [...allP(),'No project'].forEach(proj=>{
    const g=issues.filter(i=>(i.project||'No project')===proj);
    if(!g.length)return;
    lines.push('=== '+proj.toUpperCase()+' ===');
    [{key:'action',label:'Needs action'},{key:'blocked',label:'Blocked'},{key:'reminder',label:'Reminder'},{key:'pending',label:'Pending decision'},{key:'watch',label:'Watching'},{key:'done',label:'Done / Resolved'}].forEach(sec=>{
      const sg=g.filter(i=>i.status===sec.key);
      if(!sg.length)return;
      lines.push('  '+sec.label+':');
      sg.forEach(i=>{
        lines.push('  - '+i.title+' ['+(CM[i.category]||{label:i.category}).label+']');
        if(i.notes)lines.push('    '+i.notes);
        if(i.checkin)lines.push('    check-in: '+i.checkin);
      });
    });
    lines.push('');
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='radar.txt';a.click();
}
document.getElementById('dt').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeProjModal();}});
load();render();checkBackupReminder();
</script>
</body>
