<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rdc-red: #D92228;
    --rdc-red-dark: #B01B20;
    --rdc-red-light: #FCEAEA;
    --rdc-navy: #1A1A1A;

    --bg: #F5F5F5;
    --surface: #FFFFFF;
    --surface2: #F0F0F0;
    --border: #E2E2E2;
    --border-dark: #CACACA;
    --text: #1A1A1A;
    --text-muted: #5C5C5C;
    --text-faint: #9A9A9A;

    --status-watch-bg: #FFF8E6;
    --status-watch-text: #7A5C00;
    --status-watch-dot: #E9A825;

    --status-action-bg: var(--rdc-red-light);
    --status-action-text: #8C1A1E;
    --status-action-dot: var(--rdc-red);

    --status-blocked-bg: #F0EDFF;
    --status-blocked-text: #3D2C8F;
    --status-blocked-dot: #6B53D6;

    --cat-own: #1D9E75;
    --cat-xfn: #2176C7;
    --cat-design: var(--rdc-red);
    --cat-people: #8B3FA8;

    --font-display: 'Source Serif 4', Georgia, serif;
    --font-sans: 'Source Sans 3', system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111111;
      --surface: #1C1C1C;
      --surface2: #262626;
      --border: #303030;
      --border-dark: #444444;
      --text: #F2F2F2;
      --text-muted: #A0A0A0;
      --text-faint: #5A5A5A;

      --rdc-red-light: #2A0708;
      --status-watch-bg: #2A2100;
      --status-watch-text: #F5C842;
      --status-action-bg: #2A0708;
      --status-action-text: #F47578;
      --status-blocked-bg: #110E2A;
      --status-blocked-text: #A899F0;
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
    max-width: 900px;
    margin: 0 auto;
  }

  .rdc-topbar {
    background: var(--rdc-red);
    height: 4px;
    width: 100%;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.3px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 5px;
  }

  .header-left h1 span {
    color: var(--rdc-red);
    font-style: normal;
    font-weight: 600;
    font-family: var(--font-sans);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 10px;
    vertical-align: middle;
  }

  .header-left p {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border-dark);
    background: var(--surface);
    color: var(--text);
  }

  .btn:hover { background: var(--surface2); }

  .btn-primary {
    background: var(--rdc-red);
    color: #FFFFFF;
    border-color: var(--rdc-red);
  }

  .btn-primary:hover { background: var(--rdc-red-dark); border-color: var(--rdc-red-dark); }

  .filters {
    display: flex;
    gap: 6px;
    margin: 0 32px 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 5px 13px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--border-dark); color: var(--text); }
  .filter-btn.active { background: var(--rdc-navy); color: #FFFFFF; border-color: var(--rdc-navy); }

  .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .issues-list { display: flex; flex-direction: column; gap: 2px; padding: 0 32px; }

  .issue-row {
    display: grid;
    grid-template-columns: 24px 1fr auto auto auto;
    align-items: start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: border-color 0.15s;
    cursor: pointer;
  }

  .issue-row:hover { border-color: var(--border-dark); }
  .issue-row.expanded { border-color: var(--border-dark); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }

  .cat-stripe {
    width: 3px;
    height: 100%;
    border-radius: 2px;
    min-height: 20px;
    align-self: stretch;
  }

  .issue-main { min-width: 0; }

  .issue-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .issue-meta {
    font-size: 12px;
    color: var(--text-faint);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .status-badge {
    font-size: 11px;
    font-family: var(--font-sans);
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    align-self: start;
  }

  .status-watch  { background: var(--status-watch-bg);   color: var(--status-watch-text); }
  .status-action { background: var(--status-action-bg);  color: var(--status-action-text); }
  .status-blocked{ background: var(--status-blocked-bg); color: var(--status-blocked-text); }

  .chevron {
    font-size: 14px;
    color: var(--text-faint);
    align-self: start;
    transition: transform 0.2s;
    padding-top: 2px;
    font-style: normal;
  }

  .issue-row.expanded .chevron { transform: rotate(90deg); }

  .issue-detail {
    display: none;
    padding: 12px 16px 14px 52px;
    background: var(--surface);
    border: 1px solid var(--border-dark);
    border-top: none;
    border-radius: 0 0 6px 6px;
  }

  .issue-detail.open { display: block; }

  .detail-note {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    border-left: 2px solid var(--rdc-red);
    padding-left: 12px;
    margin-bottom: 12px;
  }

  .detail-checkin {
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 8px;
  }

  .detail-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .detail-actions button {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .detail-actions button:hover { color: var(--text); border-color: var(--border-dark); }
  .detail-actions button.danger:hover { color: var(--rdc-red); border-color: var(--rdc-red); }

  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--text-faint);
    font-size: 14px;
  }

  .empty-state p:first-child {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 8px;
    color: var(--text-muted);
  }

  .summary-bar {
    display: flex;
    gap: 20px;
    margin: 0 32px 24px;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid var(--border);
    align-items: center;
  }

  .summary-item { font-size: 12px; color: var(--text-muted); }
  .summary-item strong { color: var(--text); font-weight: 600; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-dark);
    border-radius: 8px;
    padding: 28px;
    width: 520px;
    max-width: 92vw;
    max-height: 88vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-family: var(--font-display);
    font-weight: 300;
    font-style: italic;
    font-size: 22px;
    margin-bottom: 20px;
    color: var(--text);
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .field input, .field textarea, .field select {
    width: 100%;
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 9px 12px;
    border-radius: 4px;
    border: 1px solid var(--border-dark);
    background: var(--surface2);
    color: var(--text);
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--rdc-red);
  }

  .field select option { background: var(--surface); }

  .cat-radios {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .cat-radio {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    color: var(--text-muted);
  }

  .cat-radio input { display: none; }
  .cat-radio:hover { border-color: var(--border-dark); color: var(--text); }
  .cat-radio.selected { border-color: var(--rdc-red); background: var(--rdc-red-light); color: var(--text); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 24px;
  }

  .section-divider {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 20px 32px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>

<div class="rdc-topbar"></div>
<header>
  <div class="header-left">
    <h1><span>RDC</span>Radar</h1>
    <p id="today-date"></p>
  </div>
  <div class="header-right">
    <button class="btn" onclick="exportLog()">Export</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add to radar</button>
  </div>
</header>

<div class="summary-bar" id="summary-bar"></div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" data-filter="status-action" onclick="setFilter('status-action', this)"><span class="dot" style="background:var(--status-action-dot)"></span>Needs action</button>
  <button class="filter-btn" data-filter="status-watch" onclick="setFilter('status-watch', this)"><span class="dot" style="background:var(--status-watch-dot)"></span>Watching</button>
  <button class="filter-btn" data-filter="status-blocked" onclick="setFilter('status-blocked', this)"><span class="dot" style="background:var(--status-blocked-dot)"></span>Blocked</button>
  <button class="filter-btn" data-filter="cat-own" onclick="setFilter('cat-own', this)">My tasks</button>
  <button class="filter-btn" data-filter="cat-xfn" onclick="setFilter('cat-xfn', this)">X-fn</button>
  <button class="filter-btn" data-filter="cat-design" onclick="setFilter('cat-design', this)">Design/product</button>
  <button class="filter-btn" data-filter="cat-people" onclick="setFilter('cat-people', this)">People</button>
</div>

<div class="issues-list" id="issues-list"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h2 id="modal-title">New issue</h2>
    <input type="hidden" id="edit-id">

    <div class="field">
      <label>What is it?</label>
      <input type="text" id="f-title" placeholder="One-line summary…">
    </div>

    <div class="field">
      <label>Category</label>
      <div class="cat-radios">
        <label class="cat-radio" id="cr-own">
          <input type="radio" name="cat" value="own">
          <span class="dot" style="background:var(--cat-own)"></span> My tasks & open loops
        </label>
        <label class="cat-radio" id="cr-xfn">
          <input type="radio" name="cat" value="xfn">
          <span class="dot" style="background:var(--cat-xfn)"></span> X-fn dependencies
        </label>
        <label class="cat-radio" id="cr-design">
          <input type="radio" name="cat" value="design">
          <span class="dot" style="background:var(--cat-design)"></span> Design / product decisions
        </label>
        <label class="cat-radio" id="cr-people">
          <input type="radio" name="cat" value="people">
          <span class="dot" style="background:var(--cat-people)"></span> Team / people things
        </label>
      </div>
    </div>

    <div class="field">
      <label>Status</label>
      <select id="f-status">
        <option value="watch">Watching</option>
        <option value="action">Needs action</option>
        <option value="blocked">Blocked on someone</option>
      </select>
    </div>

    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="f-notes" rows="3" placeholder="Context, background, who's involved…"></textarea>
    </div>

    <div class="field">
      <label>Check-in date (optional)</label>
      <input type="date" id="f-checkin">
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveIssue()">Save issue</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'radar_v1';

  const CAT_META = {
    own:    { label: 'My tasks',      color: 'var(--cat-own)',    bg: '#E1F5EE', tc: '#085041' },
    xfn:    { label: 'X-fn',          color: 'var(--cat-xfn)',    bg: '#E6F1FB', tc: '#0C3E78' },
    design: { label: 'Design',        color: 'var(--cat-design)', bg: '#FCEAEA', tc: '#8C1A1E' },
    people: { label: 'People',        color: 'var(--cat-people)', bg: '#F5E8FF', tc: '#5B1A8A' },
  };

  const STATUS_META = {
    watch:   { label: 'Watching',         cls: 'status-watch',   dot: 'var(--status-watch-dot)' },
    action:  { label: 'Needs action',     cls: 'status-action',  dot: 'var(--status-action-dot)' },
    blocked: { label: 'Blocked on someone', cls: 'status-blocked', dot: 'var(--status-blocked-dot)' },
  };

  let issues = [];
  let activeFilter = 'all';

  function load() {
    try { issues = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { issues = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(issues));
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function matchesFilter(issue) {
    if (activeFilter === 'all') return true;
    if (activeFilter.startsWith('status-')) return issue.status === activeFilter.replace('status-','');
    if (activeFilter.startsWith('cat-')) return issue.category === activeFilter.replace('cat-','');
    return true;
  }

  function render() {
    const visible = issues.filter(matchesFilter);

    const counts = { watch: 0, action: 0, blocked: 0 };
    issues.forEach(i => counts[i.status]++);
    document.getElementById('summary-bar').innerHTML =
      `<span class="summary-item"><strong>${issues.length}</strong> total</span>` +
      `<span class="summary-item"><span class="dot" style="background:var(--status-action-dot)"></span><strong>${counts.action}</strong> need action</span>` +
      `<span class="summary-item"><span class="dot" style="background:var(--status-watch-dot)"></span><strong>${counts.watch}</strong> watching</span>` +
      `<span class="summary-item"><span class="dot" style="background:var(--status-blocked-dot)"></span><strong>${counts.blocked}</strong> blocked</span>`;

    const list = document.getElementById('issues-list');

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>Nothing here yet.</p><p>${activeFilter === 'all' ? 'Add your first issue above.' : 'No issues match this filter.'}</p></div>`;
      return;
    }

    const sorted = [...visible].sort((a,b) => {
      const order = { action: 0, blocked: 1, watch: 2 };
      return order[a.status] - order[b.status];
    });

    const sections = [
      { key: 'action',  label: 'Needs action' },
      { key: 'blocked', label: 'Blocked on someone' },
      { key: 'watch',   label: 'Watching' },
    ];

    let html = '';
    sections.forEach(sec => {
      const group = sorted.filter(i => i.status === sec.key);
      if (!group.length) return;
      html += `<div class="section-divider"><span class="dot" style="background:${STATUS_META[sec.key].dot}"></span>${sec.label}</div>`;
      group.forEach(issue => { html += renderIssue(issue); });
    });

    list.innerHTML = html;
  }

  function renderIssue(issue) {
    const cat = CAT_META[issue.category] || CAT_META.own;
    const st = STATUS_META[issue.status];
    const added = new Date(issue.created).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const checkin = issue.checkin ? `· check-in ${new Date(issue.checkin + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}` : '';
    const catBgDark = issue.category === 'own' ? '#04342C' : issue.category === 'xfn' ? '#042C53' : issue.category === 'design' ? '#4A1B0C' : '#2A0040';

    return `
      <div class="issue-row" id="row-${issue.id}" onclick="toggleDetail('${issue.id}')">
        <div class="cat-stripe" style="background:${cat.color}"></div>
        <div class="issue-main">
          <div class="issue-title">${escHtml(issue.title)}</div>
          <div class="issue-meta">
            <span style="padding:2px 7px; border-radius:3px; font-size:10px; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; background:${cat.bg}; color:${cat.tc};">${cat.label}</span>
            <span>added ${added}${checkin}</span>
          </div>
        </div>
        <span class="status-badge ${st.cls}">${st.label}</span>
        <span class="chevron">›</span>
      </div>
      <div class="issue-detail" id="detail-${issue.id}">
        ${issue.notes ? `<div class="detail-note">${escHtml(issue.notes)}</div>` : '<div class="detail-note" style="opacity:0.5">No notes added.</div>'}
        ${issue.checkin ? `<div class="detail-checkin">Check-in: ${new Date(issue.checkin + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' })}</div>` : ''}
        <div class="detail-actions">
          <button onclick="event.stopPropagation(); editIssue('${issue.id}')">Edit</button>
          <button onclick="event.stopPropagation(); cycleStatus('${issue.id}')">Cycle status</button>
          <button class="danger" onclick="event.stopPropagation(); deleteIssue('${issue.id}')">Delete</button>
        </div>
      </div>`;
  }

  function toggleDetail(id) {
    const row = document.getElementById('row-' + id);
    const detail = document.getElementById('detail-' + id);
    const wasOpen = detail.classList.contains('open');
    document.querySelectorAll('.issue-detail.open').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.issue-row.expanded').forEach(r => r.classList.remove('expanded'));
    if (!wasOpen) {
      detail.classList.add('open');
      row.classList.add('expanded');
    }
  }

  function cycleStatus(id) {
    const order = ['watch', 'action', 'blocked'];
    const issue = issues.find(i => i.id === id);
    if (!issue) return;
    issue.status = order[(order.indexOf(issue.status) + 1) % order.length];
    save();
    render();
  }

  function deleteIssue(id) {
    if (!confirm('Remove this issue?')) return;
    issues = issues.filter(i => i.id !== id);
    save();
    render();
  }

  function openModal(issue) {
    document.getElementById('modal-title').textContent = issue ? 'Edit item' : 'Add to radar';
    document.getElementById('edit-id').value = issue ? issue.id : '';
    document.getElementById('f-title').value = issue ? issue.title : '';
    document.getElementById('f-status').value = issue ? issue.status : 'watch';
    document.getElementById('f-notes').value = issue ? (issue.notes || '') : '';
    document.getElementById('f-checkin').value = issue ? (issue.checkin || '') : '';

    document.querySelectorAll('.cat-radio').forEach(r => r.classList.remove('selected'));
    const catVal = issue ? issue.category : 'own';
    const mapping = { own: 'cr-own', xfn: 'cr-xfn', design: 'cr-design', people: 'cr-people' };
    const targetLabel = document.getElementById(mapping[catVal]);
    if (targetLabel) {
      targetLabel.classList.add('selected');
      targetLabel.querySelector('input').checked = true;
    }

    document.querySelectorAll('.cat-radio').forEach(lbl => {
      lbl.addEventListener('click', () => {
        document.querySelectorAll('.cat-radio').forEach(r => r.classList.remove('selected'));
        lbl.classList.add('selected');
      });
    });

    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function editIssue(id) {
    const issue = issues.find(i => i.id === id);
    if (issue) openModal(issue);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function closeModalOnBg(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function saveIssue() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }

    const catInput = document.querySelector('input[name="cat"]:checked');
    const category = catInput ? catInput.value : 'own';
    const status = document.getElementById('f-status').value;
    const notes = document.getElementById('f-notes').value.trim();
    const checkin = document.getElementById('f-checkin').value;
    const editId = document.getElementById('edit-id').value;

    if (editId) {
      const issue = issues.find(i => i.id === editId);
      if (issue) { issue.title = title; issue.category = category; issue.status = status; issue.notes = notes; issue.checkin = checkin; }
    } else {
      issues.unshift({ id: Date.now().toString(), title, category, status, notes, checkin, created: new Date().toISOString() });
    }

    save();
    closeModal();
    render();
  }

  function exportLog() {
    const lines = ['RADAR — exported ' + new Date().toLocaleDateString(), ''];
    const sections = [{ key:'action', label:'NEEDS ACTION' }, { key:'blocked', label:'BLOCKED' }, { key:'watch', label:'WATCHING' }];
    sections.forEach(sec => {
      const group = issues.filter(i => i.status === sec.key);
      if (!group.length) return;
      lines.push('── ' + sec.label + ' ──');
      group.forEach(i => {
        lines.push('• ' + i.title + ' [' + (CAT_META[i.category]?.label || i.category) + ']');
        if (i.notes) lines.push('  ' + i.notes);
        if (i.checkin) lines.push('  check-in: ' + i.checkin);
      });
      lines.push('');
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'radar.txt'; a.click();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setDate() {
    const d = new Date();
    document.getElementById('today-date').textContent = d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  load();
  setDate();
  render();
</script>
</body>
</html>
